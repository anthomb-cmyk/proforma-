<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion — FluxLocatif</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(30,144,255,.16), transparent 28%),
        radial-gradient(circle at top right, rgba(147,51,234,.12), transparent 24%),
        linear-gradient(180deg, #f7f9ff 0%, #f4f6fb 100%);
    }

    .card {
      width: min(420px, calc(100% - 32px));
      background: rgba(255,255,255,.92);
      border: 1px solid rgba(255,255,255,.7);
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 24px 70px rgba(79,70,229,.10);
      backdrop-filter: blur(14px);
    }

    h1 {
      margin: 0 0 8px;
      color: #191d45;
    }

    p {
      margin: 0 0 20px;
      color: #6b7280;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      margin-bottom: 12px;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid #d9d9ef;
      font-size: 15px;
      outline: none;
    }

    input:focus {
      border-color: rgba(79, 70, 229, 0.4);
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.10);
    }

    button {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 14px 18px;
      font-size: 15px;
      font-weight: 800;
      color: white;
      cursor: pointer;
      background: linear-gradient(135deg, #1e90ff 0%, #4f46e5 48%, #9333ea 100%);
    }

    .error {
      margin-top: 12px;
      color: #991b1b;
      font-size: 14px;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Connexion</h1>
    <p>Connectez-vous pour accéder à FluxLocatif.</p>

    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Mot de passe" />
    <button id="loginBtn">Se connecter</button>
    <div class="error" id="errorMsg"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseClient = window.supabase.createClient(
      "https://nuuzkvgyolxbawvqyugu.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im51dXprdmd5b2x4YmF3dnF5dWd1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3Njc1NzYsImV4cCI6MjA4OTM0MzU3Nn0.zjltrYd38fypIAm1DIr0wj69eS9T7xpi_4p2aWsNYyw"
    );

    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");
    const errorMsg = document.getElementById("errorMsg");

    async function login() {
      errorMsg.textContent = "";

      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email || !password) {
        errorMsg.textContent = "Veuillez entrer votre email et votre mot de passe.";
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = "Connexion...";

      const { error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        errorMsg.textContent = error.message || "Erreur de connexion.";
        loginBtn.disabled = false;
        loginBtn.textContent = "Se connecter";
        return;
      }

      window.location.href = "/";
    }

    loginBtn.addEventListener("click", login);

    passwordInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        login();
      }
    });
  </script>
</body>
</html>
