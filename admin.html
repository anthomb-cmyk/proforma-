<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FluxLocatif Admin</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <div class="page-bg"></div>

  <div class="admin-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">F</div>
        <div>
          <h1>FluxLocatif</h1>
          <p>Interface administrateur</p>
        </div>
      </div>

      <div class="menu">
        <button class="menu-btn active" data-tab="users">Utilisateurs</button>
        <button class="menu-btn" data-tab="sessions">Sessions</button>
        <button class="menu-btn" data-tab="messages">Conversations</button>
        <button class="menu-btn" data-tab="apartments">Appartements</button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <span class="eyebrow">Admin</span>
          <h2 id="pageTitle">Utilisateurs</h2>
        </div>
        <button id="refreshBtn" class="primary-btn">Rafraîchir</button>
      </header>

      <section class="card" id="usersTab">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Nom</th>
                <th>Jour</th>
                <th>Heartbeats</th>
                <th>Total secondes</th>
                <th>Total minutes</th>
              </tr>
            </thead>
            <tbody id="usersBody"></tbody>
          </table>
        </div>
      </section>

      <section class="card hidden" id="sessionsTab">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Session ID</th>
                <th>User ID</th>
                <th>Début</th>
                <th>Fin</th>
                <th>Dernière activité</th>
              </tr>
            </thead>
            <tbody id="sessionsBody"></tbody>
          </table>
        </div>
      </section>

      <section class="card hidden" id="messagesTab">
        <div class="filters">
          <input id="messageUserId" type="text" placeholder="Filtrer par user_id" />
          <button id="loadMessagesBtn" class="secondary-btn">Charger</button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>User ID</th>
                <th>Mode</th>
                <th>Sender</th>
                <th>Texte</th>
              </tr>
            </thead>
            <tbody id="messagesBody"></tbody>
          </table>
        </div>
      </section>

      <section class="card hidden" id="apartmentsTab">
        <div class="form-card">
          <h3>Ajouter un appartement</h3>

          <form id="apartmentForm" class="admin-form">
            <div class="form-grid">
              <input id="aptRef" type="text" placeholder="Ref (ex: L-1004)" required />
              <input id="aptAdresse" type="text" placeholder="Adresse" required />
              <input id="aptVille" type="text" placeholder="Ville" required />
              <input id="aptType" type="text" placeholder="Type logement" />
              <input id="aptChambres" type="number" placeholder="Chambres" />
              <input id="aptSuperficie" type="text" placeholder="Superficie" />
              <input id="aptLoyer" type="number" placeholder="Loyer" />
              <input id="aptInclusions" type="text" placeholder="Inclusions" />
              <input id="aptStatut" type="text" placeholder="Statut" />
              <input id="aptStationnement" type="text" placeholder="Stationnement" />
              <input id="aptAnimaux" type="text" placeholder="Animaux acceptés" />
              <input id="aptMeuble" type="text" placeholder="Meublé" />
              <input id="aptDisponibilite" type="text" placeholder="Disponibilité" />
              <input id="aptElectricite" type="text" placeholder="Électricité" />
            </div>

            <textarea id="aptNotes" placeholder="Notes"></textarea>

            <div class="form-actions">
              <button type="submit" class="primary-btn">Ajouter l’appartement</button>
            </div>
          </form>

          <div id="apartmentFormStatus"></div>
        </div>

        <div class="table-wrap" style="margin-top: 22px;">
          <table>
            <thead>
              <tr>
                <th>Ref</th>
                <th>Adresse</th>
                <th>Ville</th>
                <th>Type</th>
                <th>Loyer</th>
                <th>Disponibilité</th>
                <th>Statut</th>
              </tr>
            </thead>
            <tbody id="apartmentsBody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="admin.js"></script>
</body>
</html>
