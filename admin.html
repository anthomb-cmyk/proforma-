<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FluxLocatif Admin</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <div class="page-bg"></div>

  <div class="admin-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">F</div>
        <div>
          <h1>FluxLocatif</h1>
          <p>Interface administrateur</p>
        </div>
      </div>

      <div class="menu">
        <button class="menu-btn active" data-tab="users">Utilisateurs</button>
        <button class="menu-btn" data-tab="sessions">Sessions</button>
        <button class="menu-btn" data-tab="messages">Conversations</button>
        <button class="menu-btn" data-tab="apartments">Appartements</button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <span class="eyebrow">Admin</span>
          <h2 id="pageTitle">Utilisateurs</h2>
        </div>
        <button id="refreshBtn" class="primary-btn">Rafraîchir</button>
      </header>

      <section class="card" id="usersTab">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Nom</th>
                <th>Jour</th>
                <th>Heartbeats</th>
                <th>Total minutes</th>
                <th>Total heures</th>
              </tr>
            </thead>
            <tbody id="usersBody"></tbody>
          </table>
        </div>
      </section>

      <section class="card hidden" id="sessionsTab">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Session ID</th>
                <th>User ID</th>
                <th>Début</th>
                <th>Fin</th>
                <th>Dernière activité</th>
              </tr>
            </thead>
            <tbody id="sessionsBody"></tbody>
          </table>
        </div>
      </section>

      <section class="card hidden" id="messagesTab">
        <div class="filters">
          <input id="messageUserId" type="text" placeholder="Filtrer par user_id" />
          <button id="loadMessagesBtn" class="secondary-btn">Charger</button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>User ID</th>
                <th>Mode</th>
                <th>Sender</th>
                <th>Texte</th>
              </tr>
            </thead>
            <tbody id="messagesBody"></tbody>
          </table>
        </div>
      </section>

      <section class="card hidden" id="apartmentsTab">
        <div class="form-card">
          <h3>Ajouter un appartement</h3>

          <form id="apartmentForm" class="admin-form">
            <div class="form-grid">
              <input id="aptAdresse" type="text" placeholder="Adresse" required />
              <input id="aptVille" type="text" placeholder="Ville" required />

              <select id="aptType">
                <option value="">Type logement</option>
                <option value="1 1/2">1 1/2</option>
                <option value="2 1/2">2 1/2</option>
                <option value="3 1/2">3 1/2</option>
                <option value="4 1/2">4 1/2</option>
                <option value="5 1/2">5 1/2</option>
                <option value="6 1/2">6 1/2</option>
                <option value="Studio">Studio</option>
                <option value="Loft">Loft</option>
              </select>

              <select id="aptChambres">
                <option value="">Chambres</option>
                <option value="0">0</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
              </select>

              <input id="aptSuperficie" type="text" placeholder="Superficie" />
              <input id="aptLoyer" type="number" placeholder="Loyer" />

              <select id="aptInclusions">
                <option value="">Inclusions</option>
                <option value="aucune">Aucune</option>
                <option value="chauffage inclus">Chauffage inclus</option>
                <option value="eau chaude incluse">Eau chaude incluse</option>
                <option value="chauffage et eau chaude inclus">Chauffage et eau chaude inclus</option>
                <option value="électricité incluse">Électricité incluse</option>
                <option value="tout inclus">Tout inclus</option>
              </select>

              <select id="aptStatut">
                <option value="">Statut</option>
                <option value="disponible">Disponible</option>
                <option value="loué">Loué</option>
                <option value="réservé">Réservé</option>
              </select>

              <select id="aptStationnement">
                <option value="">Stationnement</option>
                <option value="aucun">Aucun</option>
                <option value="extérieur">Extérieur</option>
                <option value="intérieur">Intérieur</option>
                <option value="garage">Garage</option>
                <option value="inclus">Inclus</option>
              </select>

              <select id="aptAnimaux">
                <option value="">Animaux acceptés</option>
                <option value="oui">Oui</option>
                <option value="non">Non</option>
                <option value="chats seulement">Chats seulement</option>
                <option value="petits chiens seulement">Petits chiens seulement</option>
              </select>

              <select id="aptMeuble">
                <option value="">Meublé</option>
                <option value="oui">Oui</option>
                <option value="non">Non</option>
              </select>

              <input id="aptDisponibilite" type="text" placeholder="Disponibilité" />

              <select id="aptElectricite">
                <option value="">Électricité</option>
                <option value="incluse">Incluse</option>
                <option value="non incluse">Non incluse</option>
                <option value="hydro aux frais du locataire">Hydro aux frais du locataire</option>
              </select>
            </div>

            <textarea id="aptNotes" placeholder="Notes"></textarea>

            <div class="form-actions">
              <button type="submit" class="primary-btn">Ajouter l’appartement</button>
            </div>
          </form>

          <div id="apartmentFormStatus"></div>
        </div>

        <div class="table-wrap" style="margin-top: 22px;">
          <table>
            <thead>
              <tr>
                <th>Ref</th>
                <th>Adresse</th>
                <th>Ville</th>
                <th>Type</th>
                <th>Loyer</th>
                <th>Disponibilité</th>
                <th>Statut</th>
              </tr>
            </thead>
            <tbody id="apartmentsBody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="admin.js?v=4"></script>
</body>
</html>
